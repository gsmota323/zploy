<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel ZPLOY - TCC Completo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f4f7f6; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        h2 { color: #555; font-size: 1.1rem; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .btn-del { background: #dc3545; }
        .btn-del:hover { background: #a71d2a; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
        .app-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>🚀 Painel ZPLOY</h1>

    <div class="card">
        <h2>Auth</h2>
        <input type="email" id="email" value="teste" placeholder="Email">
        <input type="password" id="password" value="123" placeholder="Senha">
        <button onclick="login()">Login</button>
        <button class="success" onclick="registrar()">Registrar</button>
        <p id="statusLogin">Status: Deslogado</p>
    </div>

    <div class="card">
        <h2>Apps</h2>
        <input type="text" id="newAppName" placeholder="Nome do novo App">
        <button onclick="criarApp()">Criar App</button>
        <button onclick="listarApps()">Listar Meus Apps</button>
        <div id="listaApps"></div>
    </div>

    <div class="card" style="border: 2px solid #28a745;">
        <h2>Deploy (Fila Redis)</h2>
        <input type="text" id="deployAppId" placeholder="ID do App">
        <input type="text" id="repoUrl" value="" placeholder="URL do GitHub">
        <button style="background: #28a745;" onclick="fazerDeploy()">Disparar Deploy</button>
    </div>

    <h3>Consola <button onclick="document.getElementById('console').innerText='Aguardando...'" style="width: auto; background: #666;">Limpar</button></h3>
    <pre id="console">Aguardando...</pre>

    <script>
        const API_URL = 'http://localhost:3000';
        function log(msg) { document.getElementById('console').innerText = JSON.stringify(msg, null, 2); }

        async function login() {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
            });
            const data = await res.json();
            if(res.ok) { localStorage.setItem('token', data.token); document.getElementById('statusLogin').innerText = "Status: Logado ✅"; }
            log(data);
        }

        async function registrar() {
            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
            });
            log(await res.json());
        }

        async function criarApp() {
            const res = await fetch(`${API_URL}/apps`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token')},
                body: JSON.stringify({ name: document.getElementById('newAppName').value })
            });
            log(await res.json());
        }

        async function listarApps() {
            const res = await fetch(`${API_URL}/apps`, { headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')} });
            const data = await res.json();
            document.getElementById('listaApps').innerHTML = data.map(app => `
                <div class="app-item">
                    <span>${app.name} (${app.id.substring(0,6)}...)</span>
                    <button style="width: auto;" onclick="document.getElementById('deployAppId').value='${app.id}'">Usar ID</button>
                    <button class="btn-del" style="width: auto;" onclick="deletarApp('${app.id}')">Del</button>
                </div>
            `).join('');
            log(data);
        }

        async function deletarApp(id) {
            const res = await fetch(`${API_URL}/apps/${id}`, { method: 'DELETE', headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')} });
            log(await res.json());
            listarApps();
        }

        async function fazerDeploy() {
            const res = await fetch(`${API_URL}/apps/${document.getElementById('deployAppId').value}/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token')},
                body: JSON.stringify({ repositoryUrl: document.getElementById('repoUrl').value })
            });
            log(await res.json());
        }
    </script>
</body>
</html>
