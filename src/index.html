<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel ZPLOY - TCC Completo</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 950px;
            margin: auto;
            background: #f4f7f6;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        h2 {
            color: #555;
            font-size: 1.1rem;
            margin-top: 0;
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #0056b3;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #1e7e34;
        }

        .btn-del {
            background: #dc3545;
        }

        .btn-del:hover {
            background: #a71d2a;
        }

        .btn-gray {
            background: #666;
        }

        .btn-gray:hover {
            background: #444;
        }

        .btn-warning {
            background: #f0ad4e;
        }

        .btn-warning:hover {
            background: #d99632;
        }

        .row-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .row-buttons button {
            width: auto;
            flex: 1;
            min-width: 120px;
        }

        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 420px;
            overflow-y: auto;
        }

        .app-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .app-info {
            flex: 1;
        }

        .app-info strong {
            display: block;
        }

        .app-info small {
            color: #666;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-building {
            background: #cce5ff;
            color: #004085;
        }

        .badge-running {
            background: #d4edda;
            color: #155724;
        }

        .badge-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .log-box {
            background: #111;
            color: #eee;
        }

        .hint {
            color: #666;
            font-size: 13px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .section-title button {
            width: auto;
            padding: 8px 12px;
        }
    </style>
</head>
<body>

    <h1>🚀 Painel ZPLOY</h1>

    <div class="card">
        <h2>Auth</h2>
        <input type="email" id="email" value="teste" placeholder="Email">
        <input type="password" id="password" value="123" placeholder="Senha">

        <div class="row-buttons">
            <button onclick="login()">Login</button>
            <button class="btn-success" onclick="registrar()">Registrar</button>
        </div>

        <p id="statusLogin">Status: Deslogado</p>
    </div>

    <div class="card">
        <div class="section-title">
            <h2>Apps</h2>
            <button class="btn-gray" onclick="listarApps()">Atualizar lista</button>
        </div>

        <input type="text" id="newAppName" placeholder="Nome do novo App">

        <div class="row-buttons">
            <button onclick="criarApp()">Criar App</button>
            <button onclick="listarApps()">Listar Meus Apps</button>
        </div>

        <div id="listaApps"></div>
    </div>

    <div class="card" style="border: 2px solid #28a745;">
        <h2>Deploy</h2>

        <input type="text" id="deployAppId" placeholder="ID do App">
        <input type="text" id="repoUrl" value="" placeholder="URL do GitHub">

        <button class="btn-success" onclick="fazerDeploy()">Disparar Deploy</button>

        <p class="hint">
            Ao disparar o deploy, o ID do deploy será preenchido automaticamente na área de logs.
        </p>
    </div>

    <div class="card" style="border: 2px solid #007bff;">
        <h2>Logs do Deploy</h2>

        <input type="text" id="logDeployId" placeholder="ID do Deploy">

        <div class="row-buttons">
            <button onclick="buscarLogs()">Buscar Logs</button>
            <button class="btn-warning" onclick="iniciarAutoLogs()">Atualizar Automático</button>
            <button class="btn-del" onclick="pararAutoLogs()">Parar</button>
        </div>

        <p id="statusLogs" class="hint">Status dos logs: parado</p>

        <pre id="deployLogs" class="log-box">Nenhum log carregado...</pre>
    </div>

    <div class="card">
        <div class="section-title">
            <h2>Console</h2>
            <button class="btn-gray" onclick="limparConsole()">Limpar</button>
        </div>

        <pre id="console">Aguardando...</pre>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let logsInterval = null;

        function getToken() {
            return localStorage.getItem('token');
        }

        function log(msg) {
            document.getElementById('console').innerText = JSON.stringify(msg, null, 2);
        }

        function limparConsole() {
            document.getElementById('console').innerText = 'Aguardando...';
        }

        function getStatusClass(status) {
            if (status === 'pending') return 'badge-pending';
            if (status === 'building') return 'badge-building';
            if (status === 'running') return 'badge-running';
            if (status === 'failed') return 'badge-failed';
            if (status === 'stopped') return 'badge-pending';
            return 'badge-pending';
}

        async function login() {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                document.getElementById('statusLogin').innerText = "Status: Logado ✅";
            }

            log(data);
        }

        async function registrar() {
            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await res.json();
            log(data);
        }

        async function criarApp() {
            const res = await fetch(`${API_URL}/apps`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken()
                },
                body: JSON.stringify({
                    name: document.getElementById('newAppName').value
                })
            });

            const data = await res.json();
            log(data);

            if (res.ok) {
                listarApps();
            }
        }

        async function listarApps() {
            const res = await fetch(`${API_URL}/apps`, {
                headers: {
                    'Authorization': 'Bearer ' + getToken()
                }
            });

            const data = await res.json();

            if (!res.ok) {
                log(data);
                return;
            }

            document.getElementById('listaApps').innerHTML = data.map(app => `
                <div class="app-item">
                    <div class="app-info">
                        <strong>${app.name}</strong>
                        <small>ID: ${app.id}</small><br>
                        <span class="badge ${getStatusClass(app.status)}">${app.status || 'sem status'}</span>
                        ${app.url ? `<br><small>URL: <a href="${app.url}" target="_blank">${app.url}</a></small>` : ''}
                    </div>

                    <div class="row-buttons" style="flex: 0.7;">
                        <button onclick="usarApp('${app.id}')">Usar ID</button>
                        <button class="btn-warning" onclick="derrubarApp('${app.id}')">Derrubar</button>
                        <button class="btn-del" onclick="deletarApp('${app.id}')">Del</button>
                    </div>
                </div>
            `).join('');

            log(data);
        }

        function usarApp(appId) {
            document.getElementById('deployAppId').value = appId;
        }

        async function deletarApp(id) {
            const res = await fetch(`${API_URL}/apps/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + getToken()
                }
            });

            const data = await res.json();
            log(data);

            if (res.ok) {
                listarApps();
            }
        }

        async function fazerDeploy() {
            const appId = document.getElementById('deployAppId').value;
            const repositoryUrl = document.getElementById('repoUrl').value;

            const res = await fetch(`${API_URL}/apps/${appId}/deploy`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken()
                },
                body: JSON.stringify({
                    repositoryUrl
                })
            });

            const data = await res.json();
            log(data);

            if (res.ok && data.deployId) {
                document.getElementById('logDeployId').value = data.deployId;
                document.getElementById('deployLogs').innerText =
                    `Deploy iniciado.\nID do Deploy: ${data.deployId}\n\nClique em "Buscar Logs" ou "Atualizar Automático".`;

                buscarLogs();
            }
        }

        async function buscarLogs() {
            const deployId = document.getElementById('logDeployId').value;

            if (!deployId) {
                document.getElementById('deployLogs').innerText = 'Informe um ID de deploy.';
                return;
            }

            const res = await fetch(`${API_URL}/deploys/${deployId}/logs`, {
                headers: {
                    'Authorization': 'Bearer ' + getToken()
                }
            });

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('deployLogs').innerText = JSON.stringify(data, null, 2);
                log(data);
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                document.getElementById('deployLogs').innerText = 'Nenhum log encontrado ainda.';
                return;
            }

            const texto = data.map(item => {
                const date = item.createdAt ? new Date(item.createdAt).toLocaleTimeString() : '';
                const type = item.type ? item.type.toUpperCase() : 'LOG';
                const level = item.level ? item.level.toUpperCase() : 'INFO';

                return `[${date}] [${type}] [${level}] ${item.message}`;
            }).join('\n');

            document.getElementById('deployLogs').innerText = texto;
            document.getElementById('deployLogs').scrollTop = document.getElementById('deployLogs').scrollHeight;
        }

        function iniciarAutoLogs() {
            const deployId = document.getElementById('logDeployId').value;

            if (!deployId) {
                document.getElementById('deployLogs').innerText = 'Informe um ID de deploy antes de iniciar atualização automática.';
                return;
            }

            if (logsInterval) {
                clearInterval(logsInterval);
            }

            buscarLogs();

            logsInterval = setInterval(() => {
                buscarLogs();
            }, 2000);

            document.getElementById('statusLogs').innerText = 'Status dos logs: atualizando a cada 2 segundos';
        }

        function pararAutoLogs() {
            if (logsInterval) {
                clearInterval(logsInterval);
                logsInterval = null;
            }

            document.getElementById('statusLogs').innerText = 'Status dos logs: parado';
        }

        async function derrubarApp(appId) {
    const confirmar = confirm("Tem certeza que deseja derrubar esta aplicação?");

    if (!confirmar) {
        return;
    }

    const res = await fetch(`${API_URL}/apps/${appId}/stop`, {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + getToken()
        }
    });

    const data = await res.json();
    log(data);

    if (res.ok) {
        listarApps();
    }
}
    </script>
</body>
</html>
